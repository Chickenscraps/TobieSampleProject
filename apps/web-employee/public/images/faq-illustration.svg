<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#F3F4F6"/>
  <!-- Main question mark in speech bubble -->
  <rect x="120" y="40" width="160" height="160" fill="#316A9E" opacity="0.1"/>
  <text x="200" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="120" font-weight="bold" fill="#316A9E" opacity="0.8">?</text>
  <!-- Speech bubble tail -->
  <polygon points="180,200 200,230 220,200" fill="#316A9E" opacity="0.1"/>
  <!-- Small question marks -->
  <text x="70" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="40" font-weight="bold" fill="#316A9E" opacity="0.3">?</text>
  <text x="340" y="120" text-anchor="middle" font-family="Inter, sans-serif" font-size="35" font-weight="bold" fill="#316A9E" opacity="0.25"/>
  <!-- Person silhouette raising hand -->
  <circle cx="80" cy="220" r="15" fill="#316A9E" opacity="0.3"/>
  <rect x="70" y="235" width="20" height="40" fill="#316A9E" opacity="0.3"/>
  <line x1="90" y1="240" x2="105" y2="210" stroke="#316A9E" stroke-width="3" opacity="0.3"/>
  <!-- Person silhouette -->
  <circle cx="320" cy="230" r="15" fill="#FFB31A" opacity="0.4"/>
  <rect x="310" y="245" width="20" height="35" fill="#FFB31A" opacity="0.4"/>
</svg>