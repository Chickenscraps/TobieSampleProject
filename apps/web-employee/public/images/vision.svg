<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <rect width="300" height="400" fill="#e8f0f8"/>
  <!-- Eyeglasses -->
  <ellipse cx="110" cy="180" rx="55" ry="45" stroke="#316A9E" stroke-width="4" fill="#316A9E" opacity="0.08"/>
  <ellipse cx="190" cy="180" rx="55" ry="45" stroke="#316A9E" stroke-width="4" fill="#316A9E" opacity="0.08"/>
  <!-- Bridge -->
  <path d="M135 170 C145 160 155 160 165 170" stroke="#316A9E" stroke-width="4" fill="none"/>
  <!-- Temple arms -->
  <line x1="55" y1="170" x2="20" y2="160" stroke="#316A9E" stroke-width="4" stroke-linecap="square"/>
  <line x1="245" y1="170" x2="280" y2="160" stroke="#316A9E" stroke-width="4" stroke-linecap="square"/>
  <!-- Eye chart lines -->
  <text x="150" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" font-weight="bold" fill="#316A9E" opacity="0.5">E</text>
  <text x="130" y="90" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="bold" fill="#316A9E" opacity="0.4">F P</text>
  <text x="150" y="115" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#316A9E" opacity="0.3">T O Z</text>
  <!-- Eye icon -->
  <ellipse cx="150" cy="300" rx="60" ry="30" stroke="#316A9E" stroke-width="2" fill="#316A9E" opacity="0.1"/>
  <circle cx="150" cy="300" r="15" fill="#316A9E" opacity="0.3"/>
  <circle cx="150" cy="300" r="6" fill="#18354F" opacity="0.5"/>
  <!-- Sparkle -->
  <circle cx="155" cy="295" r="3" fill="white" opacity="0.8"/>
  <!-- Checkmark -->
  <path d="M220 340 L235 355 L265 320" stroke="#FFB31A" stroke-width="4" fill="none" stroke-linecap="square"/>
</svg>