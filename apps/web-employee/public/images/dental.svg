  <path d="M200 50 C160 50 140 80 140 110 C140 140 155 150 160 180 C165 210 165 250 180 250 C195 250 195 210 200 190 C205 210 205 250 220 250 C235 250 235 210 240 180 C245 150 260 140 260 110 C260 80 240 50 200 50Z" fill="white" stroke="#316A9E" stroke-width="3"/>
