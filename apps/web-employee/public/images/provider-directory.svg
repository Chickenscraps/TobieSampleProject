<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" fill="none">
  <rect width="900" height="300" fill="#e8f0f8"/>
  <!-- Map background lines -->
  <line x1="0" y1="150" x2="900" y2="150" stroke="#316A9E" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="100" x2="900" y2="100" stroke="#316A9E" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="200" x2="900" y2="200" stroke="#316A9E" stroke-width="0.5" opacity="0.1"/>
  <line x1="150" y1="0" x2="150" y2="300" stroke="#316A9E" stroke-width="0.5" opacity="0.1"/>
  <line x1="300" y1="0" x2="300" y2="300" stroke="#316A9E" stroke-width="0.5" opacity="0.1"/>
  <line x1="450" y1="0" x2="450" y2="300" stroke="#316A9E" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="300" stroke="#316A9E" stroke-width="0.5" opacity="0.1"/>
  <line x1="750" y1="0" x2="750" y2="300" stroke="#316A9E" stroke-width="0.5" opacity="0.1"/>
  <!-- Connection lines -->
  <line x1="150" y1="120" x2="350" y2="160" stroke="#316A9E" stroke-width="1.5" opacity="0.2"/>
  <line x1="350" y1="160" x2="550" y2="100" stroke="#316A9E" stroke-width="1.5" opacity="0.2"/>
  <line x1="550" y1="100" x2="750" y2="180" stroke="#316A9E" stroke-width="1.5" opacity="0.2"/>
  <line x1="350" y1="160" x2="450" y2="220" stroke="#316A9E" stroke-width="1.5" opacity="0.15"/>
  <line x1="550" y1="100" x2="650" y2="200" stroke="#316A9E" stroke-width="1.5" opacity="0.15"/>
  <!-- Hospital node -->
  <rect x="120" y="90" width="60" height="60" fill="#316A9E" opacity="0.15"/>
  <rect x="140" y="100" width="8" height="24" fill="#316A9E" opacity="0.5"/>
  <rect x="132" y="108" width="24" height="8" fill="#316A9E" opacity="0.5"/>
  <rect x="125" y="130" width="50" height="20" fill="#316A9E" opacity="0.1"/>
  <!-- Clinic node -->
  <rect x="320" y="130" width="60" height="60" fill="#255077" opacity="0.15"/>
  <circle cx="350" cy="150" r="12" stroke="#255077" stroke-width="2" fill="none" opacity="0.5"/>
  <rect x="346" y="142" width="8" height="16" fill="#255077" opacity="0.5"/>
  <rect x="342" y="146" width="16" height="8" fill="#255077" opacity="0.5"/>
  <!-- Pharmacy node -->
  <rect x="520" y="70" width="60" height="60" fill="#316A9E" opacity="0.15"/>
  <text x="550" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="bold" fill="#316A9E" opacity="0.5">Rx</text>
  <!-- Provider node -->
  <rect x="720" y="150" width="60" height="60" fill="#FFB31A" opacity="0.15"/>
  <circle cx="750" cy="170" r="10" fill="#FFB31A" opacity="0.4"/>
  <rect x="740" y="182" width="20" height="20" fill="#FFB31A" opacity="0.3"/>
  <!-- Map pins -->
  <circle cx="450" cy="220" r="8" fill="#FFB31A" opacity="0.5"/>
  <rect x="447" y="228" width="6" height="12" fill="#FFB31A" opacity="0.5"/>
  <circle cx="650" cy="200" r="8" fill="#316A9E" opacity="0.4"/>
  <rect x="647" y="208" width="6" height="12" fill="#316A9E" opacity="0.4"/>
</svg>