<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Robot body -->
  <rect x="15" y="25" width="50" height="40" fill="#316A9E"/>
  <!-- Antenna -->
  <line x1="40" y1="15" x2="40" y2="25" stroke="#316A9E" stroke-width="3"/>
  <circle cx="40" cy="12" r="4" fill="#FFB31A"/>
  <!-- Eyes -->
  <rect x="25" y="35" width="10" height="10" fill="white"/>
  <rect x="45" y="35" width="10" height="10" fill="white"/>
  <rect x="28" y="38" width="4" height="4" fill="#18354F"/>
  <rect x="48" y="38" width="4" height="4" fill="#18354F"/>
  <!-- Mouth -->
  <rect x="28" y="52" width="24" height="4" fill="white" opacity="0.8"/>
  <rect x="28" y="52" width="6" height="4" fill="#FFB31A" opacity="0.6"/>
  <rect x="36" y="52" width="6" height="4" fill="#FFB31A" opacity="0.6"/>
  <rect x="44" y="52" width="8" height="4" fill="#FFB31A" opacity="0.6"/>
  <!-- Speech bubble -->
  <rect x="50" y="5" width="25" height="18" fill="#FFB31A" opacity="0.8"/>
  <polygon points="55,23 58,18 52,18" fill="#FFB31A" opacity="0.8"/>
  <rect x="55" y="10" width="15" height="2" fill="white"/>
  <rect x="55" y="15" width="10" height="2" fill="white"/>
</svg>