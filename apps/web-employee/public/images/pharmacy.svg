<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <rect width="300" height="300" fill="#e8f0f8"/>
  <!-- Pill bottle -->
  <rect x="100" y="80" width="100" height="160" fill="#316A9E" opacity="0.2"/>
  <rect x="100" y="80" width="100" height="160" stroke="#316A9E" stroke-width="2" fill="none"/>
  <rect x="105" y="60" width="90" height="25" fill="#316A9E" opacity="0.4"/>
  <!-- Label on bottle -->
  <rect x="115" y="120" width="70" height="8" fill="#316A9E" opacity="0.5"/>
  <rect x="115" y="135" width="50" height="6" fill="#316A9E" opacity="0.3"/>
  <rect x="115" y="148" width="60" height="6" fill="#316A9E" opacity="0.3"/>
  <!-- Rx symbol -->
  <text x="150" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="36" font-weight="bold" fill="#316A9E" opacity="0.6">Rx</text>
  <!-- Capsule pills -->
  <rect x="40" y="180" width="35" height="16" fill="#FFB31A" opacity="0.6"/>
  <rect x="57" y="180" width="18" height="16" fill="#316A9E" opacity="0.4"/>
  <rect x="230" y="140" width="35" height="16" fill="#FFB31A" opacity="0.5" transform="rotate(30 247 148)"/>
  <rect x="247" y="140" width="18" height="16" fill="#316A9E" opacity="0.3" transform="rotate(30 256 148)"/>
  <!-- Small pills -->
  <circle cx="55" cy="260" r="10" fill="#316A9E" opacity="0.2"/>
  <circle cx="80" cy="255" r="8" fill="#FFB31A" opacity="0.3"/>
  <circle cx="240" cy="250" r="10" fill="#316A9E" opacity="0.15"/>
  <!-- Pharmacist silhouette -->
  <circle cx="260" cy="80" r="18" fill="#316A9E" opacity="0.25"/>
  <rect x="245" y="98" width="30" height="50" fill="#316A9E" opacity="0.25"/>
</svg>