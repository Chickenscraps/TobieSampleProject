[build]
  command = "cd apps/web-admin && npm run build"
  publish = "apps/web-admin/out"

[build.environment]
  NODE_VERSION = "20"

# ─── Security Headers ────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-DNS-Prefetch-Control = "on"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob:; connect-src 'self' https://ebmhlxwbqyogdhlahfmm.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
